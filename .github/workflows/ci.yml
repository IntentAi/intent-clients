name: CI

on:
  push:
    branches: [dev]
    paths: ["web/**"]
  pull_request:
    branches: [dev]
    paths: ["web/**"]

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: Bundle size
        run: |
          echo "## Bundle size" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assets" >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f -printf '%s %p\n' | sort -rn | head -20 | awk '{printf "- %s: %.1fKB\n", $2, $1/1024}' >> $GITHUB_STEP_SUMMARY
